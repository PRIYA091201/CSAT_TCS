# Supabase local dev config — CSat / The Chennai Silks
# Reference: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3001",   # kiosk
  "http://localhost:3002"    # admin-dashboard
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # dev: off. production: on.

[auth.sms]
enable_signup = false

# ─── Edge Functions ────────────────────────────────────────────────────────────

[functions.mint-token]
verify_jwt = true     # kiosk + admin roles verified inside function

[functions.validate-token]
verify_jwt = false    # anonymous — customer form calls this

[functions.submit-feedback]
verify_jwt = false    # anonymous — customer form calls this

[functions.provision-kiosk]
verify_jwt = true     # admin role only

[functions.expire-tokens]
verify_jwt = false    # cron job — no JWT
cron = "*/5 * * * *"  # every 5 minutes
